<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulubin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            font-family:system-ui,sans-serif;
        }

        .profile-card{
            width:100%;
            max-width:420px;
            padding:30px;
            border-radius:24px;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(16px);
            box-shadow:0 20px 50px rgba(0,0,0,.25);
        }

        .avatar{
            width:110px;
            height:110px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid rgba(255,255,255,.25);
        }

        .link-btn{
            border-radius:16px;
            padding:15px;
            font-size:1.1rem;
            font-weight:600;
            transition:.25s;
        }

        .link-btn:hover{
            transform:translateY(-3px);
        }

        .footer{
            color:#cbd5e1;
            font-size:.85rem;
        }
    </style>
</head>

<body>

<div class="profile-card text-center">

    <img src="https://placehold.co/200x200"
         class="avatar mb-3"
         alt="Profile">

    <h3 class="text-white mb-1">Kulubin</h3>

    <p class="text-light opacity-75 mb-4">
        Yuk hubungi lebih dekat!
    </p>

    <div class="d-grid gap-3">

        <a href="https://wa.me/6285312020222?text=Halo%20Kulubin,%20saya%20ingin%20pesan"
           target="_blank"
           class="btn btn-success link-btn">
            <i class="bi bi-whatsapp me-2"></i>
            WhatsApp
        </a>

        <a href="https://instagram.com/kulubin.id"
           target="_blank"
           class="btn btn-danger link-btn">
            <i class="bi bi-instagram me-2"></i>
            Instagram
        </a>

        <a href="https://tiktok.com/@kulubin.id"
           target="_blank"
           class="btn btn-dark link-btn">
            <i class="bi bi-tiktok me-2"></i>
            TikTok
        </a>

    </div>

    <div class="footer mt-4">
        © 2026 Kulubin
    </div>

</div>

</body>
</html>
